# Tado CE Services

set_climate_timer:
  target:
    entity:
      integration: tado_ce
      domain: climate
  fields:
    temperature:
      required: true
      example: 21
      selector:
        number:
          min: 5
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
    time_period:
      required: false
      example: "01:30:00"
      selector:
        time:
    overlay:
      required: false
      example: "next_time_block"
      selector:
        select:
          options:
            - label: "Until next schedule block"
              value: "next_time_block"
            - label: "Manual (until changed)"
              value: "manual"

set_water_heater_timer:
  target:
    entity:
      integration: tado_ce
      domain: water_heater
  fields:
    time_period:
      required: true
      example: "01:30:00"
      selector:
        time:
    temperature:
      required: false
      example: 55
      selector:
        number:
          min: 30
          max: 80
          step: 1
          unit_of_measurement: "°C"

resume_schedule:
  target:
    entity:
      integration: tado_ce
      domain:
        - climate
        - water_heater

set_climate_temperature_offset:
  fields:
    entity_id:
      required: true
      example: climate.tado_ce_lounge
      selector:
        entity:
          integration: tado_ce
          domain: climate
    offset:
      required: true
      example: 0.5
      selector:
        number:
          min: -10
          max: 10
          step: 0.1
          unit_of_measurement: "°C"

add_meter_reading:
  fields:
    reading:
      required: true
      example: 12345
      selector:
        number:
          min: 0
          max: 999999999
          mode: box
    date:
      required: false
      example: "2026-01-17"
      selector:
        date:

identify_device:
  fields:
    device_serial:
      required: true
      example: "VA1234567890"
      selector:
        text:

set_away_configuration:
  fields:
    entity_id:
      required: true
      example: climate.tado_ce_lounge
      selector:
        entity:
          integration: tado_ce
          domain: climate
    mode:
      required: true
      example: "auto"
      selector:
        select:
          options:
            - label: "Auto (Eco/Balance/Comfort)"
              value: "auto"
            - label: "Manual Temperature"
              value: "manual"
            - label: "Off"
              value: "off"
    temperature:
      required: false
      example: 16
      selector:
        number:
          min: 5
          max: 25
          step: 0.5
          unit_of_measurement: "°C"
    comfort_level:
      required: false
      example: 50
      selector:
        number:
          min: 0
          max: 100
          step: 50

get_temperature_offset:
  fields:
    entity_id:
      required: true
      example: climate.tado_ce_lounge
      selector:
        entity:
          integration: tado_ce
          domain: climate

activate_open_window:
  target:
    entity:
      integration: tado_ce
      domain: climate

deactivate_open_window:
  target:
    entity:
      integration: tado_ce
      domain: climate

set_open_window_mode:
  target:
    entity:
      integration: tado_ce
      domain: climate
  fields:
    duration:
      required: false
      example: 900
      selector:
        number:
          min: 60
          max: 3600
          step: 60
          unit_of_measurement: "s"
          mode: box
    capture_state:
      required: false
      default: true
      selector:
        boolean:

restore_previous_state:
  target:
    entity:
      integration: tado_ce
      domain:
        - climate
        - water_heater
